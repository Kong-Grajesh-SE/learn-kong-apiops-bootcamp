_format_version: "3.0"
services:
- name: bookstore-service
  url: https://httpbun.com
  retries: 3
  connect_timeout: 30000
  read_timeout: 30000
  write_timeout: 30000
  routes:
  - name: bookstore-route
    paths:
    - /bookstore
    strip_path: true
    protocols:
    - http
    - https
  plugins:
  - name: key-auth
    config:
      key_names:
      - apikey
      hide_credentials: true
  - name: rate-limiting
    config:
      minute: 60
      policy: local
consumers:
- username: bookstore-admin
  custom_id: admin-001
  keyauth_credentials:
  - key: admin-key-abc123
- username: bookstore-reader
  custom_id: reader-002
  keyauth_credentials:
  - key: reader-key-def456
